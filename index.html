<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="サプリ記録">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>サプリ記録</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f9f7;
      --surface: #ffffff;
      --border: #e8e6e0;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b67;
      --text-tertiary: #a5a5a0;
      --green: #2d8a5e;
      --green-bg: #edf7f2;
      --green-border: #b8dfc9;
      --amber: #b87a1a;
      --amber-bg: #fdf4e3;
      --amber-border: #f0d090;
      --red: #c0392b;
      --red-bg: #fdf0ee;
      --red-border: #f0b8b0;
      --radius: 14px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --surface: #1e1e1c;
        --border: #2e2e2a;
        --text-primary: #f0efe8;
        --text-secondary: #9a9a94;
        --text-tertiary: #5a5a56;
        --green: #4db87e;
        --green-bg: #162b20;
        --green-border: #2a5040;
        --amber: #d4a030;
        --amber-bg: #2a2010;
        --amber-border: #5a4010;
        --red: #e05545;
        --red-bg: #2a1412;
        --red-border: #5a2820;
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: calc(var(--safe-top) + 1.5rem) 1.25rem calc(var(--safe-bottom) + 2rem);
      min-height: 100vh;
    }

    .tab-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 1.5rem;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      background: none;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s;
    }

    .tab-btn.active {
      background: var(--bg);
      color: var(--text-primary);
      border: 0.5px solid var(--border);
    }

    .page { display: none; }
    .page.active { display: block; }

    .header { margin-bottom: 1.75rem; }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .app-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }

    .date-badge {
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--surface);
      border: 0.5px solid var(--border);
      padding: 5px 10px;
      border-radius: 20px;
      margin-top: 4px;
    }

    .progress-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .progress-label { font-size: 13px; color: var(--text-secondary); }

    .progress-count {
      font-size: 13px;
      font-weight: 600;
      color: var(--green);
    }

    .progress-track {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 3px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .section { margin-bottom: 1.5rem; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
      padding-left: 2px;
    }

    .pill-list { display: flex; flex-direction: column; gap: 7px; }

    .pill-item {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 13px 14px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
    }

    .pill-item:active { transform: scale(0.98); }

    .pill-item.checked {
      border-color: var(--green-border);
      background: var(--green-bg);
    }

    .check-circle {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }

    .pill-item.checked .check-circle {
      background: var(--green);
      border-color: var(--green);
    }

    .check-icon { opacity: 0; transition: opacity 0.15s; }
    .pill-item.checked .check-icon { opacity: 1; }

    .pill-info { flex: 1; min-width: 0; }

    .pill-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      transition: color 0.15s;
    }

    .pill-item.checked .pill-name { color: var(--green); }

    .pill-dose {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .pill-item.checked .pill-dose { color: var(--green); opacity: 0.6; }

    .footer {
      display: flex;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .reset-btn {
      font-size: 12px;
      color: var(--text-tertiary);
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 20px;
      -webkit-tap-highlight-color: transparent;
    }

    .reset-btn:active { opacity: 0.6; }

    .all-done {
      text-align: center;
      padding: 1.5rem 0 0.5rem;
      font-size: 14px;
      color: var(--green);
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .all-done.visible { opacity: 1; }

    /* 履歴 */
    .history-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 1.5rem;
    }

    .streak-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 1rem;
    }

    .streak-item { flex: 1; text-align: center; }

    .streak-num {
      font-size: 28px;
      font-weight: 700;
      color: var(--green);
      line-height: 1;
      margin-bottom: 4px;
    }

    .streak-label { font-size: 11px; color: var(--text-tertiary); }

    .streak-divider {
      width: 0.5px;
      background: var(--border);
      align-self: stretch;
    }

    .history-empty {
      text-align: center;
      color: var(--text-tertiary);
      font-size: 14px;
      padding: 3rem 0;
    }

    .history-day {
      margin-bottom: 10px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      background: var(--surface);
      overflow: hidden;
    }

    .history-day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      gap: 10px;
    }

    .history-day-header:active { opacity: 0.7; }

    .history-date {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    .history-bar-wrap {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .history-bar-fill {
      height: 100%;
      border-radius: 2px;
    }

    .history-bar-fill.full { background: var(--green); }
    .history-bar-fill.partial { background: var(--amber); }
    .history-bar-fill.none { background: var(--red-border); }

    .history-rate {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .history-rate.full {
      background: var(--green-bg);
      color: var(--green);
      border: 0.5px solid var(--green-border);
    }

    .history-rate.partial {
      background: var(--amber-bg);
      color: var(--amber);
      border: 0.5px solid var(--amber-border);
    }

    .history-rate.none {
      background: var(--red-bg);
      color: var(--red);
      border: 0.5px solid var(--red-border);
    }

    .history-chevron {
      font-size: 10px;
      color: var(--text-tertiary);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .history-chevron.open { transform: rotate(180deg); }

    .history-detail {
      display: none;
      border-top: 0.5px solid var(--border);
      padding: 10px 14px 12px;
    }

    .history-detail.open { display: block; }

    .history-pill-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-size: 13px;
    }

    .history-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .history-dot.ok { background: var(--green); }
    .history-dot.ng { background: var(--border); }

    .history-pill-name { color: var(--text-primary); }
    .history-pill-name.ng { color: var(--text-tertiary); }
  </style>
</head>
<body>
<div class="app">

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('today')">今日</button>
    <button class="tab-btn" onclick="switchTab('history')">履歴</button>
  </div>

  <!-- 今日 -->
  <div class="page active" id="page-today">
    <div class="header">
      <div class="header-top">
        <h1 class="app-title">サプリ記録</h1>
        <div class="date-badge" id="today-label"></div>
      </div>
      <div class="progress-card">
        <div class="progress-row">
          <span class="progress-label">今日の進捗</span>
          <span class="progress-count" id="progress-text">0 / 9</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <p class="section-label">朝</p>
      <div class="pill-list" id="morning-list"></div>
    </div>

    <div class="section">
      <p class="section-label">夜</p>
      <div class="pill-list" id="evening-list"></div>
    </div>

    <div class="all-done" id="all-done">✓ 今日のサプリ、すべて完了！</div>

    <div class="footer">
      <button class="reset-btn" onclick="resetToday()">今日のチェックをリセット</button>
    </div>
  </div>

  <!-- 履歴 -->
  <div class="page" id="page-history">
    <h2 class="history-title">履歴</h2>
    <div class="streak-card">
      <div class="streak-item">
        <div class="streak-num" id="streak-num">0</div>
        <div class="streak-label">連続達成日数</div>
      </div>
      <div class="streak-divider"></div>
      <div class="streak-item">
        <div class="streak-num" id="avg-num">—</div>
        <div class="streak-label">直近7日の平均</div>
      </div>
    </div>
    <div id="history-list"></div>
  </div>

</div>
<script>
const SUPPLEMENTS = [
  { id: "lcarnitine", name: "L-カルニチン",            dose: "500mg", timing: "morning" },
  { id: "citicoline",  name: "シチコリン",               dose: "300mg", timing: "morning" },
  { id: "epa",         name: "EPA",                     dose: "360mg", timing: "morning" },
  { id: "dha",         name: "DHA",                     dose: "154mg", timing: "morning" },
  { id: "natto",       name: "ナットウキナーゼ・ビタミンE", dose: "",      timing: "morning" },
  { id: "rhodiola",    name: "ロディオラ",               dose: "500mg", timing: "morning" },
  { id: "ps",          name: "ホスファチジルセリン",     dose: "",      timing: "morning" },
  { id: "nmn",         name: "NMN",                     dose: "233mg", timing: "evening" },
  { id: "camagzincd",  name: "Ca・Mg・亜鉛・ビタミンD",  dose: "",      timing: "evening" },
];

const TOTAL = SUPPLEMENTS.length;
const DAYS = ["日","月","火","水","木","金","土"];

function dateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return "supp_" + y + "-" + m + "-" + dd;
}

function todayKey() { return dateKey(new Date()); }

function loadState(key) {
  try { return JSON.parse(localStorage.getItem(key) || "{}"); } catch(e) { return {}; }
}

function saveState(s) { localStorage.setItem(todayKey(), JSON.stringify(s)); }

function doneCount(state) {
  return SUPPLEMENTS.filter(s => state[s.id]).length;
}

function updateProgress() {
  const state = loadState(todayKey());
  const done = doneCount(state);
  document.getElementById("progress-text").textContent = done + " / " + TOTAL;
  document.getElementById("progress-fill").style.width = Math.round(done / TOTAL * 100) + "%";
  document.getElementById("all-done").classList.toggle("visible", done === TOTAL);
}

function renderList(timing, containerId) {
  const state = loadState(todayKey());
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  SUPPLEMENTS.filter(s => s.timing === timing).forEach(s => {
    const checked = !!state[s.id];
    const item = document.createElement("div");
    item.className = "pill-item" + (checked ? " checked" : "");
    item.innerHTML = `
      <div class="check-circle">
        <svg class="check-icon" width="12" height="12" viewBox="0 0 12 12" fill="none">
          <polyline points="2,6 5,9 10,3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="pill-info">
        <div class="pill-name">${s.name}</div>
        ${s.dose ? `<div class="pill-dose">${s.dose}</div>` : ""}
      </div>
    `;
    item.addEventListener("click", () => {
      const st = loadState(todayKey());
      st[s.id] = !st[s.id];
      saveState(st);
      renderToday();
    });
    container.appendChild(item);
  });
}

function renderToday() {
  renderList("morning", "morning-list");
  renderList("evening", "evening-list");
  updateProgress();
}

function resetToday() {
  if (confirm("今日のチェックをリセットしますか？")) {
    localStorage.removeItem(todayKey());
    renderToday();
  }
}

function getAllHistoryKeys() {
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith("supp_")) keys.push(k);
  }
  return keys.sort().reverse();
}

function formatDateLabel(key) {
  const parts = key.replace("supp_", "").split("-");
  const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  return (d.getMonth()+1) + "/" + d.getDate() + "（" + DAYS[d.getDay()] + "）";
}

function calcStreak(keys) {
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const k = dateKey(d);
    const state = loadState(k);
    if (doneCount(state) === TOTAL) {
      streak++;
    } else if (i > 0) {
      break;
    }
  }
  return streak;
}

function calcAvg7() {
  const today = new Date();
  let total = 0, days = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const k = dateKey(d);
    const state = loadState(k);
    if (Object.keys(state).length > 0) {
      total += Math.round(doneCount(state) / TOTAL * 100);
      days++;
    }
  }
  return days > 0 ? Math.round(total / days) + "%" : "—";
}

function renderHistory() {
  const keys = getAllHistoryKeys();
  document.getElementById("streak-num").textContent = calcStreak(keys);
  document.getElementById("avg-num").textContent = calcAvg7();

  const container = document.getElementById("history-list");
  container.innerHTML = "";

  if (!keys.length) {
    container.innerHTML = `<div class="history-empty">まだ記録がありません</div>`;
    return;
  }

  keys.forEach(key => {
    const state = loadState(key);
    const done = doneCount(state);
    const pct = Math.round(done / TOTAL * 100);
    const cls = pct === 100 ? "full" : pct > 0 ? "partial" : "none";
    const label = pct === 100 ? "完全達成" : pct > 0 ? done + "/" + TOTAL : "未記録";

    const day = document.createElement("div");
    day.className = "history-day";

    const chevId = "chev-" + key;
    const detailId = "detail-" + key;

    const header = document.createElement("div");
    header.className = "history-day-header";
    header.innerHTML = `
      <span class="history-date">${formatDateLabel(key)}</span>
      <div class="history-bar-wrap">
        <div class="history-bar-fill ${cls}" style="width:${pct}%"></div>
      </div>
      <span class="history-rate ${cls}">${label}</span>
      <span class="history-chevron" id="${chevId}">▼</span>
    `;

    const detail = document.createElement("div");
    detail.className = "history-detail";
    detail.id = detailId;

    SUPPLEMENTS.forEach(s => {
      const ok = !!state[s.id];
      const row = document.createElement("div");
      row.className = "history-pill-row";
      row.innerHTML = `
        <div class="history-dot ${ok ? "ok" : "ng"}"></div>
        <span class="history-pill-name ${ok ? "" : "ng"}">${s.name}${s.dose ? " " + s.dose : ""}</span>
      `;
      detail.appendChild(row);
    });

    header.addEventListener("click", () => {
      const isOpen = detail.classList.contains("open");
      detail.classList.toggle("open", !isOpen);
      const chev = document.getElementById(chevId);
      if (chev) chev.classList.toggle("open", !isOpen);
    });

    day.appendChild(header);
    day.appendChild(detail);
    container.appendChild(day);
  });
}

function switchTab(tab) {
  document.querySelectorAll(".tab-btn").forEach((b, i) => {
    b.classList.toggle("active", (i === 0 && tab === "today") || (i === 1 && tab === "history"));
  });
  document.getElementById("page-today").classList.toggle("active", tab === "today");
  document.getElementById("page-history").classList.toggle("active", tab === "history");
  if (tab === "history") renderHistory();
}

const d = new Date();
document.getElementById("today-label").textContent =
  (d.getMonth()+1) + "/" + d.getDate() + "（" + DAYS[d.getDay()] + "）";

renderToday();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
</body>
</html>
